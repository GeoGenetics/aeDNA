
# - Only tested with Phred33 quality scores

samples: config/samples.tsv

units: config/units.tsv



#############
### READS ###
#############
trim:
  trim:
    activate: true
    tool: adapterremoval
    params: "--trimns --maxns 10 --trimqualities --minlength 30"

  # Ignored for SE
  collapse:
    activate: true
    params: "--collapse-conservatively"

derep:
  extension:
    activate: false
    k: 16
    params: "ibb=t prefilter=0 el=100 er=100 ecc=f ecco=f ignorebadquality extendrollback=0"

  derep:
    activate: true
    # vsearch or seqkit
    tool: seqkit
    params: ""

  low_complex:
    params: "entropy=0.7 entropywindow=30 entropyk=4"



#############
### ALIGN ###
#############
prefilter:
  ref:
    hires_organelles_viruses_smags:
      n_shards: 7
      path: "/datasets/caeg_dataset/references/hires-organelles-viruses-smags/20240313/hires-organelles-viruses-smags.{n_shard}.fas.gz"
      map:
        tool: bowtie2
        params: "-k 1000 -N 1 -D 15 -R 2 -L 22 -i S,1,1.15 --np 1 --mp 1,1 --rdg 0,1 --rfg 0,1 --score-min L,0,-0.08 --no-unal"
        bt2l: True
      acc2taxid: "/datasets/caeg_dataset/references/hires-organelles-viruses-smags/20240313/taxonomy/hires-organelles-viruses-smags.acc2taxid.gz"
    human_genome:
      n_shards: 1
      path: "/datasets/caeg_dataset/references/human_genome/GCF_000001405.40/GCF_000001405.40_GRCh38.p14_genomic.fas.gz"
      map:
        tool: bowtie2
        params: "-k 1000 -N 0 -D 15 -R 2 -L 22 -i S,1,1.15 --np 1 --mp 1,1 --rdg 0,1 --rfg 0,1 --score-min L,0,-0.08 --no-unal"
        bt2l: False
      acc2taxid: "/datasets/caeg_dataset/references/human_genome/GCF_000001405.40/taxonomy/hires-organelles-viruses-smags/GCF_000001405.40_GRCh38.p14_genomic.acc2taxid.gz"

  filter:
    saturated_reads:
      activate: true
      n_alns: 1000

  bam_filter:
    reassign:
      activate: false
      params: "--iters 0 --min-read-ani 92 --min-read-count 3 --scale 0 --reference-lengths /datasets/caeg_dataset/references/hires-organelles-viruses-smags/20240313/misc/genomes.len.map"

    filter:
      activate: false
      params: "--min-read-ani 92 --min-read-count 3 --min-normalized-entropy 0.6 --min-normalized-gini 0.4 --min-avg-read-ani 94 --reference-lengths /datasets/caeg_dataset/references/hires-organelles-viruses-smags/20240313/misc/genomes.len.map"

    lca:
      activate: false
      params: "--lca-rank genus --reference-lengths /datasets/caeg_dataset/references/hires-organelles-viruses-smags/20240313/misc/genomes.len.map"

  taxonomy:
    nodes: "/datasets/caeg_dataset/taxonomy/hires-organelles-viruses-smags/20240313/nodes.dmp"
    names: "/datasets/caeg_dataset/taxonomy/hires-organelles-viruses-smags/20240313/names.dmp"

  metadmg:
    damage:
      params: "--print_length 15"

    lca:
      params: "--fix_ncbi 0 --how_many 25 --weight_type 1 --edit_dist_max 10000 --lca_rank genus"

    dfit:
      params: "--nopt 5 --showfits 2"


euk:
  ref:
    refseq_mitoch:
      n_shards: 1
      path: "/datasets/caeg_dataset/references/ncbi/20250530/data/refseq_mitochondrion.genomic.fas.gz"
      map: &map_euk_bowtie2_bt2
        tool: bowtie2
        params: "-k 1000 -D 15 -R 2 -L 22 -i S,1,1.15 --np 1 --mp 1,1 --rdg 0,1 --rfg 0,1 --score-min L,0,-0.1 --no-unal"
        bt2l: False
      acc2taxid: "/datasets/caeg_dataset/references/ncbi/20250530/taxonomy/ncbi/refseq_mitochondrion.genomic.acc2taxid.gz"
    refseq_plastid:
      n_shards: 1
      path: "/datasets/caeg_dataset/references/ncbi/20250530/data/refseq_plastid.genomic.fas.gz"
      map:
        <<: *map_euk_bowtie2_bt2
      acc2taxid: "/datasets/caeg_dataset/references/ncbi/20250530/taxonomy/ncbi/refseq_plastid.genomic.acc2taxid.gz"
    core_nt:
      n_shards: 1
      path: "/datasets/caeg_dataset/references/ncbi/20250530/data/core_nt.fas.gz"
      map:
        <<: *map_euk_bowtie2_bt2
        bt2l: True
      acc2taxid: "/datasets/caeg_dataset/references/ncbi/20250530/taxonomy/ncbi/core_nt.acc2taxid.gz"

#        bt2l: True
#      acc2taxid: "/datasets/caeg_dataset/references/phylo_norway/20250127/taxonomy/ncbi/phylo_norway.acc2taxid.gz"

  filter:
    saturated_reads:
      activate: true
      n_alns: 1000

  bam_filter:
    reassign:
      activate: false
      params: "--iters 0 --min-read-ani 92 --min-read-count 3 --scale 0 --squarem-min-improvement 0.001 --squarem-max-step-factor 2.0"

    filter:
      activate: false
      params: "--min-read-ani 92 --min-read-count 3 --min-normalized-entropy 0.6 --min-normalized-gini 0.4 --min-avg-read-ani 92"

    lca:
      activate: false
      params: "--lca-rank genus"

  taxonomy:
    nodes: "/datasets/caeg_dataset/taxonomy/ncbi/20250530/nodes.dmp"
    names: "/datasets/caeg_dataset/taxonomy/ncbi/20250530/names.dmp"

  metadmg:
    damage:
      params: "--print_length 15"

    lca:
      params: "--fix_ncbi 0 --how_many 15 --sim_score_low 0.95 --weight_type 0 --lca_rank genus"

    dfit:
      params: "--nopt 5 --showfits 2"


############
## REPORT ##
############
report:
  multiqc: "--verbose --cl-config 'custom_logo: /projects/caeg/data/resources/KU_long.png' --cl-config 'custom_logo_title: CAEG - Center for Ancient Environmental Genomics' --cl-config 'custom_logo_url: https://globe.ku.dk/research/caeg/'"
  multiqc_db_url: ""

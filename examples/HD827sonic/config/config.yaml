
# - Only tested with Phred33 quality scores

samples: config/samples.tsv

units: config/units.tsv



#############
### READS ###
#############
trim:
  trim:
    activate: true
    tool: adapterremoval
    params: "--trimns --maxns 10 --trimqualities --minlength 30"

  # Ignored for SE
  collapse:
    activate: true
    params: "--collapse-conservatively"

derep:
  extension:
    activate: false
    k: 16
    params: "ibb=t prefilter=0 el=100 er=100 ecc=f ecco=f ignorebadquality extendrollback=0"

  derep:
    activate: true
    # vsearch or seqkit
    tool: seqkit
    params: ""

  low_complex:
    params: "maxns=25 minlen=30 entropy=0.7 entropywindow=30 entropyk=4"



#############
### ALIGN ###
#############
prefilter:
  ref:
    hires_organelles_viruses_smags:
      n_shards: 3
      path: "/datasets/caeg_dataset/references/hires-organelles-viruses-smags/20240313/hires-organelles-viruses-smags.{n_shard}.fas.gz"
      map:
        tool: bowtie2
        params: "-k 1000 -N 1 -D 15 -R 2 -L 22 -i S,1,1.15 --np 1 --mp 1,1 --rdg 0,1 --rfg 0,1 --score-min L,0,-0.1 --no-unal"
        bt2l: True
      acc2taxid: /datasets/caeg_dataset/references/hires-organelles-viruses-smags/20240313/taxonomy/hires-organelles-viruses-smags_acc2taxid.gz
    human_genome:
      n_shards: 1
      path: "/datasets/caeg_dataset/references/human_genome/GCF_000001405.40/GCF_000001405.40_GRCh38.p14_genomic.fas.gz"
      map:
        tool: bowtie2
        params: "-k 1000 -N 0 -D 15 -R 2 -L 22 -i S,1,1.15 --np 1 --mp 1,1 --rdg 0,1 --rfg 0,1 --score-min L,0,-0.1 --no-unal"
        bt2l: False
      acc2taxid: /datasets/caeg_dataset/references/human_genome/GCF_000001405.40/taxonomy/hires-organelles-viruses-smags_acc2taxid.gz

  filter:
    saturated_reads:
      activate: false
      n_alns: 1000

  bam_filter:
    reassign:
      activate: false
      params: "--iters 0 --min-read-ani 94 --min-read-count 3"

    filter:
      activate: false
      params: "--min-read-ani 94 --min-read-count 3 --min-expected-breadth-ratio 0.5 --min-normalized-entropy auto --min-normalized-gini auto --min-breadth 0 --min-avg-read-ani 90 --min-coverage-evenness 0.4 --min-coverage-mean 0 --include-low-detection"

    lca:
      activate: false
      params: "--lca-rank genus"

  taxonomy:
    nodes: /datasets/caeg_dataset/references/hires-organelles-viruses-smags/20240313/taxonomy/nodes.dmp
    names: /datasets/caeg_dataset/references/hires-organelles-viruses-smags/20240313/taxonomy/names.dmp

  metadmg:
    damage:
      params: "--min_length 30 --print_length 15"

    lca:
      params: "--fix_ncbi 0 --sim_score_low 0.95 --how_many 15 --lca_rank genus"

    dfit:
      params: "--nopt 10 --nbootstrap 20 --showfits 2"



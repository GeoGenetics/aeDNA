
# - Only tested with Phred33 quality scores

samples: config/samples.tsv

units: config/units.tsv



#############
### READS ###
#############
reads:
  trim:
    activate: true
    tool: adapterremoval
    params: "--minlength 30"

  # Ignored for SE
  collapse:
    activate: true
    params: "--collapse-conservatively"

  extension:
    activate: false
    k: 16
    params: "ibb=t prefilter=0 el=100 er=100 ecc=f ecco=f ignorebadquality extendrollback=0"

  derep:
    activate: true
    # vsearch or seqkit
    tool: seqkit
    params: ""

  low_complex:
    params: "maxns=25 minlen=30 entropy=0.7 entropywindow=30 entropyk=4"



#############
### ALIGN ###
#############
ref:
  wgs_eukaryota:
    n_shards: 250
    path: "/datasets/caeg_dataset/references/ncbi/20250205/data/wgs_eukaryota.{n_shard}.fas.gz"
    map: &map_bowtie2_bt2l
      tool: bowtie2
      params: "-k 1000 -D 15 -R 2 -L 22 -i S,1,1.15 --np 1 --mp 1,1 --rdg 0,1 --rfg 0,1 --score-min L,0,-0.1 --no-unal"
      bt2l: True
    acc2taxid: /datasets/caeg_dataset/references/ncbi/20250205/wgs_eukaryota.acc2taxid.gz
  phylo_norway:
    n_shards: 10
    path: "/datasets/caeg_dataset/references/phylo_norway/20250127/results/shard.{n_shard}-of-10"
    map:
      <<: *map_bowtie2_bt2l
    acc2taxid: /datasets/caeg_dataset/references/phylo_norway/20250127/phylo_norway.acc2taxid.gz
  core_nt:
    n_shards: 1
    path: "/datasets/caeg_dataset/references/ncbi/20250205/data/core_nt.fas.gz"
    map:
      <<: *map_bowtie2_bt2l
    acc2taxid: /datasets/caeg_dataset/references/ncbi/20250205/core_nt.acc2taxid.gz
  refseq_mitoch:
    n_shards: 1
    path: "/datasets/caeg_dataset/references/ncbi/20250205/data/refseq_mitochondrion.genomic.fas.gz"
    map:
      <<: *map_bowtie2_bt2l
      bt2l: False
    acc2taxid: /datasets/caeg_dataset/references/ncbi/20250205/refseq_mitochondrion.genomic.acc2taxid.gz
  refseq_plastid:
    n_shards: 1
    path: "/datasets/caeg_dataset/references/ncbi/20250205/data/refseq_plastid.genomic.fas.gz"
    map:
      <<: *map_bowtie2_bt2l
      bt2l: False
    acc2taxid: /datasets/caeg_dataset/references/ncbi/20250205/refseq_plastid.genomic.acc2taxid.gz
  refseq_archaea:
    n_shards: 1
    path: "/datasets/caeg_dataset/references/ncbi/20250205/data/refseq_archaea.genomic.fas.gz"
    map:
      <<: *map_bowtie2_bt2l
    acc2taxid: /datasets/caeg_dataset/references/ncbi/20250205/refseq_archaea.genomic.acc2taxid.gz
  refseq_bacteria:
    n_shards: 33
    path: "/datasets/caeg_dataset/references/ncbi/20250205/data/refseq_bacteria.genomic.{n_shard}.fas.gz"
    map:
      <<: *map_bowtie2_bt2l
    acc2taxid: /datasets/caeg_dataset/references/ncbi/20250205/refseq_bacteria.genomic.acc2taxid.gz
  refseq_viral:
    n_shards: 1
    path: "/datasets/caeg_dataset/references/ncbi/20250205/data/refseq_viral.genomic.fas.gz"
    map:
      <<: *map_bowtie2_bt2l
      bt2l: False
    acc2taxid: /datasets/caeg_dataset/references/ncbi/20250205/refseq_viral.genomic.acc2taxid.gz

bam_filter:
  reassign:
    activate: false
    params: "--iters 0 --min-read-ani 94 --min-read-count 3"

  filter:
    activate: false
    params: "--min-read-ani 94 --min-read-count 3 --min-expected-breadth-ratio 0.5 --min-normalized-entropy auto --min-normalized-gini auto --min-breadth 0 --min-avg-read-ani 90 --min-coverage-evenness 0.4 --min-coverage-mean 0 --include-low-detection"

  lca:
    activate: false
    params: "--lca-rank genus"

taxonomy:
  nodes: /datasets/caeg_dataset/taxonomy/20250210/nodes.dmp
  names: /datasets/caeg_dataset/taxonomy/20250210/names.dmp

metadmg:
  damage:
    params: "--min_length 30 --print_length 15"

  lca:
    params: "--fix_ncbi 0 --sim_score_low 0.95 --how_many 15"

  dfit:
    params: "--nopt 10 --nbootstrap 20 --showfits 2"

report:
  multiqc: "--verbose --cl-config 'custom_logo: /projects/caeg/data/resources/KU_long.png' --cl-config 'custom_logo_title: CAEG - Center for Ancient Environmental Genomics' --cl-config 'custom_logo_url: https://globe.ku.dk/research/caeg/'"
  multiqc_db_url: ""

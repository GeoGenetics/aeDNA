[project]
channels = ["conda-forge", "bioconda", "nodefaults"]
name = "aeDNA"
platforms = ["linux-64"]
version = "1.1.0"

[tasks]

[dependencies]
snakemake = ">=9.0.1,<9.11.3"
conda = ">=25.1.1,<26"
python = "<=3.12.8"
sqlalchemy = ">=2.0.43,<3"
sqlalchemy-utils = ">=0.42.0,<1"
psycopg2 = ">=2.9.10,<3"
snakemake-executor-plugin-slurm = ">=1.1.0,<2"
snakemake-storage-plugin-http = ">=0.3.0,<0.4"
snakemake-storage-plugin-ftp = ">=0.1.3,<0.2"

[environments]
test = { features = ["test"]}
format = { features = ["format"], no-default-feature = true }

[feature.test.dependencies]
pytest = "*"
graphviz = "*"
gatk4 = ">=4.0.51,<5"

[feature.format.dependencies]
black = "*"
snakefmt = "*"

[pypi-dependencies]
snakemake-logger-plugin-snkmt = ">=0.1.4, <0.2"

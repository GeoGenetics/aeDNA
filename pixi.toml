[project]
channels = ["conda-forge", "bioconda", "nodefaults"]
name = "aeDNA"
platforms = ["linux-64"]
version = "0.9.0"

[tasks]

[dependencies]
snakemake = ">=9.0.1,<10"
conda = ">=25.1.1,<26"
python = "<=3.12.8"
snakemake-executor-plugin-slurm = ">=1.1.0,<2"
snakemake-storage-plugin-http = ">=0.3.0,<0.4"
snakemake-storage-plugin-ftp = ">=0.1.3,<0.2"

[environments]
test = { features = ["test"], no-default-feature = true }
format = { features = ["format"], no-default-feature = true }

[feature.test.dependencies]
snakemake = ">=9.0.1,<10"
conda = ">=25.1.1,<26"

[feature.format.dependencies]
black = "*"
snakefmt = "*"


custom_logo: 'BraiDECentrC27a-A05aT01a-Z_mdm.jpg'
custom_logo_url: 'https://globe.ku.dk/research/lundbeck-foundation-geogenetics-centre/'
custom_logo_title: 'Center for Ancient Environmental Genomics'
subtitle: 'aeDNA pipeline'
intro_text: 'QC report'
plots_force_interactive: True
max_table_rows: 10000
log_filesize_limit: 50000000



report_header_info:
  - Contact E-mail: "cggbinf@list.ku.dk"
#  - Application Type: "RNA-seq"
  - Project Type: "aeDNA"
  - Sequencing Platform: "NovaSeq 6000"
#  - Sequencing Setup: "2x100"



sp:
  fastp:
    fn_re: ".+_[sp]e.json$"



extra_fn_clean_exts:
  - '_se.settings'  ## AdapterRemoval
  - '_pe.settings'  ## AdapterRemoval
  - '_pe'           ## FastP
  - '.add_rg'       ## AddReplaceReadGroups
  - '.metrics.txt'  ## BamSorMaDup / Picard MarkDuplicates
  - '.grp'          ## GATK BQSR
  - '.cram'



table_cond_formatting_rules:
  mqc-generalstats-picard-PCT_PF_READS_ALIGNED:
    warn:
      - lt: 0.9
    fail:
      - lt: 0.5
  mqc-generalstats-bamsormadup-PERCENT_DUPLICATION:
    warn:
      - gt: 25
    fail:
      - gt: 50
  mqc-generalstats-fastqc_trimmed-percent_duplicates:
    warn:
      - gt: 25
    fail:
      - gt: 50



table_cond_formatting_colours:
  - blue: '#337ab7'
  - lbue: '#5bc0de'
  - pass: '#5cb85c'
  - warn: '#f0ad4e'
  - fail: '#d9534f'



## To remove a section of a module
# https://multiqc.info/docs/#removing-modules-or-sections
module_order:
  - samtools

  - picard

  - biobambam2:
      name: 'BamSorMaDup'
      path_filters:
        - '*.metrics.txt'

  - bowtie2

  - fastqc:
      name: 'FastQC (trimmed)'
      anchor: 'fastqc_trimmed'
      info: 'FastQC results AFTER adapter trimming and QC.'
      path_filters:
        - '*/fastqc_trim/*'

  - adapterRemoval

  - bbmap:
      path_filters:
        - '*/bbduk/*'

  - cutadapt

  - fastp

  - trimmomatic

  - fastqc:
      name: 'FastQC (raw)'
      anchor: 'fastqc_raw'
      path_filters:
        - '*/fastqc_raw/*'



table_columns_visible:
  picard:
    PCT_PF_READS_ALIGNED:    True
    file_validation_status:  False
  Samtools Flagstat:
    mapped_passed:           True
  FastQC (trimmed):
    percent_duplicates:      False
    avg_sequence_length:     True
    median_sequence_length:  False
  FastQC (raw):
    percent_duplicates:      False
    avg_sequence_length:     False
    median_sequence_length:  False
    percent_gc:              False
    total_sequences:         False



